description = "Balanced-bracket check with a generic stack"
source   = "leetcode valid_parentheses"
category = "core-language"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "valid_parentheses.td"

[[error]]
patch   = "errors/bad-rune.patch"   # two-character rune literal
expect  = ["E0111"]
stage   = "parse"
matches = "errors/bad-rune.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/try-in-bool-fn.patch"   # try in isValid, which returns bool
expect  = ["E0402"]
stage   = "sema"
matches = "errors/try-in-bool-fn.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/organic-isvalid3-e0112.patch"   # Classic stack-based bracket matching: push openers, pop and verify closers …
expect  = ["E0112"]
stage   = "parse"
matches = "errors/organic-isvalid3-e0112.expected"
origin  = "organic:holefill-3"

[[error]]
patch   = "errors/stray-break.patch"   # a stray break with no enclosing loop
expect  = ["E0404"]
stage   = "sema"
matches = "errors/stray-break.expected"
origin  = "synthetic"
