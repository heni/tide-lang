description = "Interface conformance"
source   = "borgo interfaces"
category = "core-language"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "interfaces.td"

[[error]]
patch   = "errors/extra-arg-baz.patch"   # baz takes one argument, given two
expect  = ["E0202"]
stage   = "sema"
matches = "errors/extra-arg-baz.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/class-equality.patch"   # == on a class type; use refEq for identity
expect  = ["E0401"]
stage   = "sema"
matches = "errors/class-equality.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/dup-baz.patch"   # a second top-level declaration of baz
expect  = ["E0113"]
stage   = "sema"
matches = "errors/dup-baz.expected"
origin  = "synthetic"
