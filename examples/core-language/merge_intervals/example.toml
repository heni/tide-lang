description = "Merge overlapping intervals with a comparator"
source   = "leetcode merge_intervals"
category = "core-language"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "merge_intervals.td"

[[error]]
patch   = "errors/dup-field-interval.patch"   # Interval has two fields named start
expect  = ["E0105"]
stage   = "sema"
matches = "errors/dup-field-interval.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/typo-intervals.patch"   # typo: interval instead of intervals
expect  = ["E0103"]
stage   = "sema"
matches = "errors/typo-intervals.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/interval-dup-end.patch"   # Interval declares end twice
expect  = ["E0105"]
stage   = "sema"
matches = "errors/interval-dup-end.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/organic-merge3-e0112.patch"   # Merge overlapping intervals by sorting by start, then sweeping to extend or …
expect  = ["E0112"]
stage   = "parse"
matches = "errors/organic-merge3-e0112.expected"
origin  = "organic:holefill-3"
