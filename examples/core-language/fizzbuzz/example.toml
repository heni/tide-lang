description = "Toolchain smoke: ranges, branches, output"
source   = "interview fizzbuzz"
category = "core-language"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "fizzbuzz.td"

[[error]]
patch   = "errors/missing-in.patch"   # drop the `in` keyword from the for-loop header
expect  = ["E0112"]
stage   = "parse"
matches = "errors/missing-in.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/bad-octal.patch"   # 0o9 is not a valid octal literal
expect  = ["E0109"]
stage   = "parse"
matches = "errors/bad-octal.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/missing-brace.patch"   # for body opening brace omitted
expect  = ["E0112"]
stage   = "parse"
matches = "errors/missing-brace.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/stray-break.patch"   # a stray break with no enclosing loop
expect  = ["E0404"]
stage   = "sema"
matches = "errors/stray-break.expected"
origin  = "synthetic"
