description = "Error chaining with Result"
source   = "raku error_chain"
category = "modeling-errors"
showcase = false
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "error_chain.td"

[[error]]
patch   = "errors/typo-trimmed.patch"   # typo: trimed instead of trimmed
expect  = ["E0103"]
stage   = "sema"
matches = "errors/typo-trimmed.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/break-in-pipeline.patch"   # break outside any loop
expect  = ["E0404"]
stage   = "sema"
matches = "errors/break-in-pipeline.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/organic-dividend2-e0112.patch"   # Check if n is odd; return ParseError if so, otherwise return n/2 as success.
expect  = ["E0112"]
stage   = "parse"
matches = "errors/organic-dividend2-e0112.expected"
origin  = "organic:holefill-2"

[[error]]
patch   = "errors/organic-dividend2-e0201.patch"   # Check evenness with modulo; construct Ok/Err variants; interpolate n into …
expect  = ["E0201"]
stage   = "sema"
matches = "errors/organic-dividend2-e0201.expected"
origin  = "organic:holefill-2"
