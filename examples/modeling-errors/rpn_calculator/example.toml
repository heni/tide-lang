description = "RPN evaluator with Result/try over sum-typed tokens"
source   = "interview rpn_calculator"
category = "modeling-errors"
showcase = true
forces   = []   # TODO backfill against lang-spec artefact IDs
since    = "0.1"
status   = "running"
expects  = "run-pass"
entry    = "rpn_calculator.td"

[[error]]
patch   = "errors/drop-mul-arm.patch"   # apply's match over Op drops the Mul arm
expect  = ["E0303"]
stage   = "sema"
matches = "errors/drop-mul-arm.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/try-in-main.patch"   # try in main, which returns unit
expect  = ["E0402"]
stage   = "sema"
matches = "errors/try-in-main.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/typo-error-ctor.patch"   # typo: eror instead of error
expect  = ["E0103"]
stage   = "sema"
matches = "errors/typo-error-ctor.expected"
origin  = "synthetic"

[[error]]
patch   = "errors/organic-apply_op-e0201.patch"   # Pattern match on the operator, perform arithmetic, catch division by zero.
expect  = ["E0201"]
stage   = "sema"
matches = "errors/organic-apply_op-e0201.expected"
origin  = "organic:holefill-1"

[[error]]
patch   = "errors/organic-parseop2-e0112.patch"   # Map operator strings to Op variants using exhaustive match; return None for …
expect  = ["E0112"]
stage   = "parse"
matches = "errors/organic-parseop2-e0112.expected"
origin  = "organic:holefill-2"

[[error]]
patch   = "errors/stray-break.patch"   # a stray break with no enclosing loop
expect  = ["E0404"]
stage   = "sema"
matches = "errors/stray-break.expected"
origin  = "synthetic"
