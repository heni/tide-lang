# Per-example feature manifest.
#
# This file is the contract for the Formal-L corpus audit: each
# example in examples/ declares which language features it
# exercises, and the audit verifies every catalogued feature
# has ≥ 1 example.
#
# Feature names mirror the formal docs:
#   - lexical / syntactic constructs from grammar.ebnf and keywords.md
#   - typing rules (T-*) from type-system.md (referenced by shorthand)
#   - built-in container methods from builtins.md
#   - IR-level constructs from desugaring.md (only the user-visible ones)
#   - diagnostic categories from diagnostics.md (only when an example
#     deliberately demonstrates a working path; negative-test fixtures
#     are tracked separately in tests/sema/, not here)
#
# Schema:
#   features:           closed vocabulary
#     <feature-id>:     human-readable description
#   examples:
#     <path>:           list of feature-ids the example exercises
#
# Coverage invariant (Formal-L):
#   for f in features: at least one example in examples lists f
#   no example lists a feature not in features
#
# Authority: this file is the contract. Adding a new feature
# requires (a) a paired rule in a formal doc and (b) at least
# one example that exercises it.
#
# Ubiquitous features (used by nearly every example) are listed
# under `ubiquitous:` below; the audit treats them as covered if
# the corpus is non-empty. This avoids forcing every example to
# tag every line — saves churn without weakening the contract.

#
# Bump policy: minor bump (1 → 2 → 3 …) on any vocabulary
# rename, feature removal, or schema-structure change. Tag
# additions are NOT a bump (purely additive). The L-audit
# is keyed on `version`; an audit run against a different
# version refuses to compare.

version: 1

# Features assumed covered by the corpus as a whole. Audit
# passes them if `examples:` is non-empty.
#
# Only features that **every Tide program of meaningful size**
# uses go here. Anything narrower belongs in the per-example
# tag list — false positives in `ubiquitous:` defeat the audit
# (it can't detect that nothing exercises the feature).
ubiquitous:
  - imports
  - top-level-func
  - let-binding
  - return-value
  - assignment
  - binding-fmt

features:
  # ── Lexical / declarations ───────────────────────────────
  imports:                     "import <pkg> from the Go stdlib binding surface"
  top-level-let:               "TopLevelLet — immutable module-level binding"
  top-level-func:              "FuncDecl at file scope"
  type-decl-alias:             "type T = ... (alias)"
  type-decl-record:            "type T = { f1: T1; ... } (record)"
  type-decl-tuple-alias:       "type T = (T1, T2, ...)"
  type-decl-sum:               "type T = | V1 | V2(...) ... (sum type)"
  class-decl:                  "class C { ... }"
  class-generic:               "class C<T, ...> { ... }"
  interface-decl:              "interface I { ... }"
  implements-clause:           "class C implements I, I2"

  # ── Bindings / control flow ──────────────────────────────
  let-binding:                 "let x = ... (immutable local)"
  var-binding:                 "var x = ... (mutable local)"
  assignment:                  "lvalue = expr"
  if-expr:                     "if-as-expression (T-If-Expr)"
  if-stmt:                     "if-as-statement (T-If-Stmt)"
  match-expr:                  "match scrutinee { arms }"
  match-wildcard:              "match arm with `_` pattern"
  match-tuple-pattern:         "tuple-shape pattern in match"
  match-record-pattern:        "record-shape pattern in match"
  match-variant-pattern:       "variant-with-payload pattern"
  match-alt-pattern:           "AltPat — `a | b | c =>`"
  match-literal-pattern:       "literal value in pattern (int/rune/string/bool)"
  for-slice:                   "for x in []T"
  for-indexed-slice:           "for (i, x) in []T"
  for-map:                     "for (k, v) in Map<K, V>"
  for-set:                     "for x in Set<T>"
  for-range:                   "for i in lo..hi or lo..=hi"
  for-string:                  "for r in str — rune iteration"
  for-channel:                 "for v in RecvChan<T>"
  while-loop:                  "while c { ... }"
  break-stmt:                  "break inside loop"
  continue-stmt:               "continue inside loop"
  return-value:                "return <expr>"
  return-unit:                 "bare `return`"
  defer-call:                  "defer <call>"

  # ── Type-driven features ─────────────────────────────────
  option-type:                 "Option<T> with Some/None"
  result-type:                 "Result<T, E> with Ok/Err"
  try-result:                  "try e where e: Result<T, E>"
  try-option:                  "try e where e: Option<T>"
  generics-func:               "generic function with type parameters"
  generics-class:              "generic class instantiation"
  conversion:                  "primitive conversion like int(x), string(b)"
  tuple-construction:          "(a, b, ...)"
  tuple-field-access:          "t.0, t.1, ..."
  record-construction:         "R { f1: v1, ... }"
  record-field-access:         "obj.field"
  refEq:                       "refEq(a, b) class identity check"
  panic:                       "panic(msg) call"
  any-type:                    "Any escape type (variadic binding boundary)"
  unit-type:                   "unit type / `()` literal"

  # ── Containers (literal + key methods) ───────────────────
  slice-literal:               "[e_1, ..., e_n] (T-Slice-Lit-Nonempty)"
  slice-empty-literal:         "[]T{} (T-Slice-Lit-Empty / Annot)"
  slice-index:                 "s[i] / s[i] = v"
  slice-slicing:               "s[lo:hi]"
  slice-push:                  "xs.push(e) — functional append"
  slice-len:                   "xs.len()"
  map-literal:                 "Map<K, V>{ k: v, ... } or Map.new()"
  map-get:                     "m.get(k): Option<V>"
  map-set:                     "m.set(k, v): unit"
  map-has:                     "m.has(k): bool"
  map-delete:                  "m.delete(k): unit"
  set-literal:                 "Set<T>{ e, ... } or Set.new()"
  set-add:                     "s.add(e): unit"
  set-has:                     "s.has(e): bool"
  stack-literal:               "Stack<T>{} or Stack.new()"
  stack-push:                  "stk.push(e)"
  stack-pop:                   "stk.pop(): Result<T, error>"

  # ── Concurrency ──────────────────────────────────────────
  scope-block:                 "scope<T, error> { ... }"
  spawn-block:                 "spawn { ... } inside a scope"
  scope-context:               "scope.context — cancellable context.Context"
  channel-make:                "makeChannel<T>() / makeChannel<T>(cap)"
  channel-send:                "ch.send(v)"
  channel-recv:                "ch.recv()"
  channel-tryRecv:             "ch.tryRecv(): Option<T>"
  channel-close:               "ch.close()"
  channel-widening:            "Channel<T> → SendChan<T> / RecvChan<T>"
  select-block:                "select { case ... default ... }"

  # ── Class internals ──────────────────────────────────────
  class-field-var:             "var field in class body"
  class-field-let:             "let field in class body"
  class-method-instance:       "instance method on a class"
  class-method-static:         "static method on a class"
  implicit-receiver:           "bare field/method use inside instance method"

  # ── Closures ─────────────────────────────────────────────
  closure-short:               "(x, y) => expr — short closure form"
  closure-full:                "(x: T) => { Block }"

  # ── Stdlib bindings (representative pkgs) ────────────────
  binding-fmt:                 "fmt.println / fmt.printf"
  binding-os:                  "os.args / os.exit / os.stdin"
  binding-io:                  "io.readAll / io.copy"
  binding-log:                 "log.println / log.fatal"
  binding-net:                 "net.dialTCP / net.listen"
  binding-strings:             "strings.fields / strings.split / strings.count"
  binding-strconv:             "strconv.atoi / strconv.itoa / strconv.parseFloat"
  binding-bufio:               "bufio.NewScanner / Scan / Text"
  binding-time:                "time.sleep / time.after / time.now"
  binding-context:             "context.Context arg / context.Background"
  binding-net-http:            "net/http.Handler / ListenAndServe"
  binding-json:                "encoding/json.Marshal / Unmarshal"
  binding-sync:                "sync.Mutex / lock / unlock"
  binding-mathbig:             "math/big BigInt operations"

